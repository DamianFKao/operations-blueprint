services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ops
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - pgdata:/var/lib/postgresql/data
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ops
    ports:
      - "8000:8000"
    depends_on:
      - db
  # redis:   # enable when you add background jobs or caching
  #   image: redis:7
  # qdrant:  # enable when you add the knowledge layer (vector search over SOPs and specs)
  #   image: qdrant/qdrant
volumes:
  pgdata:
